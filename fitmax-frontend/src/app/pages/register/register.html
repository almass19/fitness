<section class="auth-page">
  <div class="auth-topbar">
    <div class="brand" routerLink="/">FITMAX</div>

    <div class="language-switcher">
      <button type="button" (click)="changeLanguage('en')" [class.active]="currentLang === 'en'">EN</button>
      <button type="button" (click)="changeLanguage('ru')" [class.active]="currentLang === 'ru'">RU</button>
      <button type="button" (click)="changeLanguage('kz')" [class.active]="currentLang === 'kz'">KZ</button>
    </div>
  </div>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="mini-logo">▲</div>
      <h1>{{ texts.title }}</h1>
      <p class="subtitle">{{ texts.subtitle }}</p>

      <form (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label>{{ texts.firstName }}</label>
          <input
            type="text"
            [(ngModel)]="firstName"
            name="firstName"
            [placeholder]="texts.firstName"
          />
        </div>

        <div class="form-group">
          <label>{{ texts.lastName }}</label>
          <input
            type="text"
            [(ngModel)]="lastName"
            name="lastName"
            [placeholder]="texts.lastName"
          />
        </div>

        <div class="form-group">
          <label>{{ texts.birthDate }}</label>
          <input
            type="date"
            [(ngModel)]="birthDate"
            name="birthDate"
          />
        </div>

        <div class="form-group">
          <label>{{ texts.email }}</label>
          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            [placeholder]="texts.email"
          />
        </div>

        <div class="form-group">
          <label>{{ texts.password }}</label>
          <input
            type="password"
            [(ngModel)]="password"
            name="password"
            [placeholder]="texts.password"
          />
        </div>

        <button type="submit" class="submit-btn">{{ texts.createAccount }}</button>
      </form>

      <p class="bottom-text">
        {{ texts.haveAccount }}
        <a routerLink="/login">{{ texts.login }}</a>
      </p>
    </div>
  </div>
</section>
